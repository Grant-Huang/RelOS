name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"
  NEO4J_URI: bolt://localhost:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: relos_test
  REDIS_URL: redis://localhost:6379/0

jobs:
  # ── Job 1: 代码质量检查 ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check (lint)
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: MyPy type check
        run: mypy relos/ --ignore-missing-imports
        continue-on-error: true  # 类型检查暂为 warning 级别

  # ── Job 2: 单元测试 ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --tb=short \
            --cov=relos \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Job 3: 集成测试（需要 Neo4j + Redis）────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/relos_test
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p relos_test 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for Neo4j to be ready
        run: |
          for i in {1..20}; do
            if python -c "from neo4j import GraphDatabase; GraphDatabase.driver('${{ env.NEO4J_URI }}', auth=('${{ env.NEO4J_USER }}', '${{ env.NEO4J_PASSWORD }}')).verify_connectivity()"; then
              echo "Neo4j ready"; break
            fi
            echo "Waiting for Neo4j... ($i)"; sleep 3
          done

      - name: Run integration tests (MVP smoke)
        run: |
          pytest tests/integration/ -v -m mvp \
            --tb=short \
            -x

  # ── Job 4: Docker 构建验证 ────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag relos:ci-${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            .
        continue-on-error: true  # Dockerfile 可能尚未创建
