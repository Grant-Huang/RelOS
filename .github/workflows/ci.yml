name: RelOS CI

on:
  push:
    branches: ["main", "develop", "claude/**"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.11"
  NEO4J_AUTH: neo4j/relos_dev
  NEO4J_URI: bolt://localhost:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: relos_dev
  REDIS_URL: redis://localhost:6379/0
  ENV: test
  SHADOW_MODE: "true"

jobs:
  # ─── Job 1：单元测试（无外部依赖）──────────────────────────────────
  unit-tests:
    name: Unit Tests (105 tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit -v \
            --cov=relos \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -m "not integration and not e2e"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─── Job 2：代码规范检查 ────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check relos/

      - name: Ruff format check
        run: ruff format --check relos/

      - name: MyPy type check (core modules)
        run: mypy relos/core/ relos/ingestion/ --ignore-missing-imports
        continue-on-error: true

  # ─── Job 3：集成测试（需要 Neo4j + Redis）──────────────────────────
  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: ${{ env.NEO4J_AUTH }}
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: apoc.*
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p relos_dev 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            if python -c "
from neo4j import GraphDatabase
d = GraphDatabase.driver('bolt://localhost:7687', auth=('neo4j','relos_dev'))
d.verify_connectivity(); d.close(); print('OK')
" 2>/dev/null; then break; fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 3
          done

      - name: Run integration tests
        run: pytest tests/integration -v -m integration --timeout=60
        env:
          NEO4J_URI: ${{ env.NEO4J_URI }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}

      - name: Run E2E tests
        run: pytest tests/e2e -v -m integration --timeout=120
        env:
          NEO4J_URI: ${{ env.NEO4J_URI }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
        continue-on-error: true

  # ─── Job 4：Docker 构建验证 ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker build --target dev -t relos:dev-ci .

      - name: Verify Python import
        run: |
          docker run --rm \
            -e NEO4J_URI=bolt://localhost:7687 \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e ENV=test \
            relos:dev-ci \
            python -c "from relos.main import create_app; print('App loaded OK')"
