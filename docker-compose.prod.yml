version: "3.9"

# ────────────────────────────────────────────────────────────────────
# RelOS 生产环境 Docker Compose
# 使用方式：
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# 与开发环境差异：
#   - API 使用 production 构建阶段（无 --reload，非 root 用户）
#   - Neo4j 内存更大（2G heap），数据持久化到命名卷
#   - Redis 配置持久化（AOF + RDB 双写）
#   - 不挂载源码（镜像内已包含）
#   - 显式指定重启策略
# ────────────────────────────────────────────────────────────────────

services:

  # ── 图数据库 ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"   # Browser UI 只绑定本机（不对外暴露）
      - "127.0.0.1:7687:7687"   # Bolt 只绑定本机
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "1G"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "1G"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      # 生产环境禁用 Browser（内网访问才开放）
      NEO4J_server_http_enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s     # Neo4j 首次启动需要较长时间

  # ── 缓存 / 任务队列 ──────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"   # 只绑定本机
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RelOS API（生产模式）─────────────────────────────────────────
  api:
    build:
      context: .
      target: production         # 使用精简生产镜像（非 root 用户）
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # 仅本机，通过 Nginx 反代对外
    environment:
      ENV: "production"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      REDIS_URL: "redis://redis:6379/0"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"

      # 决策引擎
      RULE_ENGINE_MIN_CONFIDENCE: "${RULE_ENGINE_MIN_CONFIDENCE:-0.75}"
      HITL_TRIGGER_CONFIDENCE: "${HITL_TRIGGER_CONFIDENCE:-0.50}"
      SHADOW_MODE: "${SHADOW_MODE:-false}"

      # 安全
      JWT_ENABLED: "${JWT_ENABLED:-true}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-[]}"

      # 限流
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_REQUESTS: "${RATE_LIMIT_REQUESTS:-100}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"

      # 多租户
      MULTI_TENANT_ENABLED: "${MULTI_TENANT_ENABLED:-false}"
      DEFAULT_FACTORY_ID: "${DEFAULT_FACTORY_ID:-factory-default}"

      # 可观测性（可选）
      LANGSMITH_ENABLED: "${LANGSMITH_ENABLED:-false}"
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY:-}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT:-relos-production}"

      # Temporal（可选）
      TEMPORAL_HOST: "${TEMPORAL_HOST:-localhost:7233}"
      TEMPORAL_NAMESPACE: "${TEMPORAL_NAMESPACE:-default}"
      TEMPORAL_TASK_QUEUE: "${TEMPORAL_TASK_QUEUE:-relos-actions}"

    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

    # 生产模式：不挂载源码
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  redis_data:
    driver: local
